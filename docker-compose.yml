services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: moneytransfer-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${DB_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend/MoneyTransfer.Api
    container_name: moneytransfer-api
    ports:
      - "5059:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=MoneyTransferDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True"
    depends_on:
      sqlserver:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: moneytransfer-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  sql_data: